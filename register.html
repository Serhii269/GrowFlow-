<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/register.css" />
    <link rel="icon" type="image/x-icon" href="assets/icons/logo.svg" />
    <title>GrowFlow — Register</title>
  </head>
  <body>
    <div class="auth-layout">
      <div class="auth-left">
        <a href="index.html" class="auth-back">
          <img src="assets/icons/logo.svg" alt="logo" />
          GrowFlow
        </a>

        <div class="auth-left-content">
          <h1>
            <span class="text-green">Cultivate better</span><br />
            <span class="text-green">habits,</span>
            <span class="text-dark">one day at</span><br />
            <span class="text-dark">a time.</span>
          </h1>
        </div>

        <div class="auth-left-image">
          <img src="assets/images/register-plant.png" alt="plant" />
        </div>
      </div>

      <div class="auth-right">
        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-register">Register</button>
          <button class="auth-tab" id="tab-login">Log in</button>
        </div>

        <div class="auth-form-wrap" id="form-register">
          <div class="auth-form-header">
            <h2>Create Account</h2>
            <p>Step into your new growth journey.</p>
          </div>

          <form class="auth-form" id="register-form">
            <div class="auth-field">
              <label for="reg-name">Full Name</label>
              <input
                type="text"
                id="reg-name"
                placeholder="John Green"
                required
              />
            </div>
            <div class="auth-field">
              <label for="reg-email">Email Address</label>
              <input
                type="email"
                id="reg-email"
                placeholder="john@example.com"
                required
              />
            </div>
            <div class="auth-field">
              <label for="reg-password">Password</label>
              <input
                type="password"
                id="reg-password"
                placeholder="••••••••"
                required
              />
            </div>
            <div class="auth-checkbox">
              <input type="checkbox" id="terms" required />
              <label for="terms">
                I agree to the <a href="terms.html">Terms of Service</a> and
                <a href="privacy.html">Privacy Policy</a>.
              </label>
            </div>
            <p class="form-error" id="form-error"></p>
            <button type="submit" class="auth-btn" id="submit-btn">
              Create Account
            </button>
            <p class="auth-switch">
              Already have an account? <a href="#" id="go-login">Log in</a>
            </p>
          </form>
        </div>

        <div class="auth-form-wrap hidden" id="form-login">
          <div class="auth-form-header">
            <h2>Welcome back</h2>
            <p>Continue growing where you left off.</p>
          </div>

          <form class="auth-form" id="login-form">
            <div class="auth-field">
              <label for="login-email">Email Address</label>
              <input
                type="email"
                id="login-email"
                placeholder="john@example.com"
                required
              />
            </div>
            <div class="auth-field">
              <label for="login-password">Password</label>
              <input
                type="password"
                id="login-password"
                placeholder="••••••••"
                required
              />
            </div>
            <div class="auth-forgot">
              <a href="#">Forgot password?</a>
            </div>
            <p class="form-error" id="login-error"></p>
            <button type="submit" class="auth-btn" id="login-btn">
              Log in
            </button>
            <p class="auth-switch">
              Don't have an account? <a href="#" id="go-register">Register</a>
            </p>
          </form>
        </div>
      </div>
    </div>

    <script src="js/register.js"></script>
  </body>
</html>
