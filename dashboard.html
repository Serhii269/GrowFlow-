<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/garden.css" />
    <link rel="icon" type="image/x-icon" href="assets/icons/logo.svg" />
    <title>GrowFlow — Dashboard</title>
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-top">
          <a href="index.html" class="logo">
            <img
              src="assets/icons/logo.svg"
              alt="logo"
              width="28"
              height="28"
            />
            <span>GrowFlow</span>
          </a>
          <button class="new-habit-btn" id="openModal">
            <img
              src="assets/icons/nav-plus.svg"
              alt=""
              width="18"
              height="18"
            />
            New Habit
          </button>
        </div>

        <nav class="sidebar-nav">
          <a href="dashboard.html" class="nav-link active">
            <img
              src="assets/icons/nav-dashboard.svg"
              alt=""
              width="18"
              height="18"
            />
            Dashboard
          </a>
          <a href="garden.html" class="nav-link">
            <img
              src="assets/icons/nav-garden.svg"
              alt=""
              width="18"
              height="18"
            />
            Garden
          </a>
          <a href="focus.html" class="nav-link">
            <img
              src="assets/icons/nav-focus.svg"
              alt=""
              width="18"
              height="18"
            />
            Focus
          </a>
          <a href="ai.html" class="nav-link">
            <img src="assets/icons/nav-ai.svg" alt="" width="18" height="18" />
            AI Assistant
          </a>
        </nav>

        <div
          class="sidebar-user"
          id="sidebar-user"
          onclick="window.location.href='profile.html'"
          style="cursor: pointer"
        >
          <div class="user-avatar"><span>AM</span></div>
          <div class="user-info">
            <p class="user-name">Alex Morgan</p>
            <span class="user-status">Premium</span>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <div class="page-header">
          <h1 id="greeting"></h1>
          <p id="current-date"></p>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <span class="stat-label">Daily Completion</span>
            <p class="stat-value" id="completion-stat">0%</p>
            <div class="stat-bar">
              <div class="stat-bar-fill" id="completion-bar"></div>
            </div>
          </div>
          <div class="stat-card">
            <span class="stat-label">Tasks today</span>
            <p class="stat-value" id="tasks-stat">0 / 0</p>
          </div>
          <div class="stat-card">
            <span class="stat-label">Streak</span>
            <p class="stat-value">7 days</p>
          </div>
        </div>

        <p class="section-title">Today's habits</p>

        <div class="habits-list" id="habits-list">
          <div class="habits-empty" id="habits-empty">
            <img
              src="assets/icons/nav-garden.svg"
              alt=""
              width="28"
              height="28"
            />
            <p>No habits yet. Click <strong>New Habit</strong> to start.</p>
          </div>
        </div>
      </main>
    </div>

    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <div class="modal-header">
          <h2>New Habit</h2>
          <button class="modal-close" id="closeModal">
            <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
              <path
                d="M1 1l8 8M9 1L1 9"
                stroke="currentColor"
                stroke-width="1.6"
                stroke-linecap="round"
              />
            </svg>
          </button>
        </div>

        <div class="modal-body">
          <div class="modal-field">
            <label>Habit name</label>
            <input
              type="text"
              id="habit-name"
              placeholder="e.g. Read 10 pages"
            />
          </div>

          <div class="modal-field">
            <label>Deadline</label>
            <input type="date" id="habit-deadline" />
          </div>

          <div class="modal-field">
            <label>Icon</label>
            <div class="icon-picker">
              <button class="icon-btn active" data-icon="book-open">
                <img
                  src="assets/icons/habits/book-open.svg"
                  width="20"
                  height="20"
                  alt=""
                />
              </button>
              <button class="icon-btn" data-icon="droplets">
                <img
                  src="assets/icons/habits/droplets.svg"
                  width="20"
                  height="20"
                  alt=""
                />
              </button>
              <button class="icon-btn" data-icon="dumbbell">
                <img
                  src="assets/icons/habits/dumbbell.svg"
                  width="20"
                  height="20"
                  alt=""
                />
              </button>
              <button class="icon-btn" data-icon="moon">
                <img
                  src="assets/icons/habits/moon.svg"
                  width="20"
                  height="20"
                  alt=""
                />
              </button>
              <button class="icon-btn" data-icon="apple">
                <img
                  src="assets/icons/habits/apple.svg"
                  width="20"
                  height="20"
                  alt=""
                />
              </button>
              <button class="icon-btn" data-icon="pen-line">
                <img
                  src="assets/icons/habits/pen-line.svg"
                  width="20"
                  height="20"
                  alt=""
                />
              </button>
              <button class="icon-btn" data-icon="heart">
                <img
                  src="assets/icons/habits/heart.svg"
                  width="20"
                  height="20"
                  alt=""
                />
              </button>
              <button class="icon-btn" data-icon="music">
                <img
                  src="assets/icons/habits/music.svg"
                  width="20"
                  height="20"
                  alt=""
                />
              </button>
              <button class="icon-btn" data-icon="monitor">
                <img
                  src="assets/icons/habits/monitor.svg"
                  width="20"
                  height="20"
                  alt=""
                />
              </button>
              <button class="icon-btn" data-icon="bike">
                <img
                  src="assets/icons/habits/bike.svg"
                  width="20"
                  height="20"
                  alt=""
                />
              </button>
            </div>
          </div>

          <div class="modal-field">
            <label>Plant</label>
            <div class="plant-picker">
              <button
                class="plant-btn active"
                data-plant="sprout"
                data-name="Sprout"
              >
                <img
                  src="assets/icons/plants/sprout.svg"
                  width="22"
                  height="22"
                  alt=""
                />
                <p>Sprout</p>
              </button>
              <button class="plant-btn" data-plant="fern" data-name="Fern">
                <img
                  src="assets/icons/plants/leaf.svg"
                  width="22"
                  height="22"
                  alt=""
                />
                <p>Fern</p>
              </button>
              <button
                class="plant-btn"
                data-plant="blossom"
                data-name="Blossom"
              >
                <img
                  src="assets/icons/plants/flower-2.svg"
                  width="22"
                  height="22"
                  alt=""
                />
                <p>Blossom</p>
              </button>
              <button class="plant-btn" data-plant="pine" data-name="Pine">
                <img
                  src="assets/icons/plants/tree-pine.svg"
                  width="22"
                  height="22"
                  alt=""
                />
                <p>Pine</p>
              </button>
              <button class="plant-btn" data-plant="oak" data-name="Oak">
                <img
                  src="assets/icons/plants/tree-deciduous.svg"
                  width="22"
                  height="22"
                  alt=""
                />
                <p>Oak</p>
              </button>
            </div>
          </div>
        </div>

        <div class="modal-footer">
          <button class="modal-cancel" id="cancelModal">Cancel</button>
          <button class="modal-submit" id="submitHabit">Create Habit</button>
        </div>
      </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/garden.js"></script>
  </body>
</html>
