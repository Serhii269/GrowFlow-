<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/garden.css" />
    <link rel="stylesheet" href="styles/profile.css" />
    <link rel="icon" type="image/x-icon" href="assets/icons/logo.svg" />
    <title>GrowFlow — Profile</title>
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-top">
          <a href="index.html" class="logo">
            <img
              src="assets/icons/logo.svg"
              alt="logo"
              width="28"
              height="28"
            />
            <span>GrowFlow</span>
          </a>
          <button
            class="new-habit-btn"
            onclick="window.location.href='dashboard.html'"
          >
            <img
              src="assets/icons/nav-plus.svg"
              alt=""
              width="18"
              height="18"
            />
            New Habit
          </button>
        </div>

        <nav class="sidebar-nav">
          <a href="dashboard.html" class="nav-link">
            <img
              src="assets/icons/nav-dashboard.svg"
              alt=""
              width="18"
              height="18"
            />
            Dashboard
          </a>
          <a href="garden.html" class="nav-link">
            <img
              src="assets/icons/nav-garden.svg"
              alt=""
              width="18"
              height="18"
            />
            Garden
          </a>
          <a href="focus.html" class="nav-link">
            <img
              src="assets/icons/nav-focus.svg"
              alt=""
              width="18"
              height="18"
            />
            Focus
          </a>
          <a href="ai.html" class="nav-link">
            <img src="assets/icons/nav-ai.svg" alt="" width="18" height="18" />
            AI Assistant
          </a>
        </nav>

        <div
          class="sidebar-user active"
          onclick="window.location.href='profile.html'"
          style="cursor: pointer"
        >
          <div class="user-avatar"><span>AM</span></div>
          <div class="user-info">
            <p class="user-name">Alex Morgan</p>
            <span class="user-status">Premium</span>
          </div>
        </div>
      </aside>

      <main class="main-content">
        <div class="page-header">
          <h1>Profile</h1>
          <p>Manage your account</p>
        </div>

        <div class="profile-layout">
          <div class="profile-card">
            <div class="profile-avatar">
              <span id="profile-initials">AM</span>
            </div>
            <div class="profile-info">
              <h2 id="profile-name">Alex Morgan</h2>
              <p id="profile-email">alex@example.com</p>
            </div>
          </div>

          <div class="profile-card">
            <p class="profile-card-label">Change Password</p>
            <form id="password-form">
              <div class="profile-field">
                <label>Current Password</label>
                <input
                  type="password"
                  id="current-password"
                  placeholder="••••••••"
                />
              </div>
              <div class="profile-field">
                <label>New Password</label>
                <input
                  type="password"
                  id="new-password"
                  placeholder="••••••••"
                />
              </div>
              <div class="profile-field">
                <label>Confirm New Password</label>
                <input
                  type="password"
                  id="confirm-password"
                  placeholder="••••••••"
                />
              </div>
              <p class="profile-error" id="password-error"></p>
              <p class="profile-success" id="password-success"></p>
              <button type="submit" class="profile-btn">Update Password</button>
            </form>
          </div>

          <div class="profile-card profile-danger">
            <p class="profile-card-label">Account</p>
            <a href="php/logout.php" class="logout-btn">Log out</a>
          </div>
        </div>
      </main>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/profile.js"></script>
  </body>
</html>
